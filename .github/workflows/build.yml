name: Injector_Perfect_Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract and Prep Files
        run: |
          unzip -o "*.zip"
          # Makefile dosyasını bul ve her şeyi bulunduğu klasörden ana dizine çek
          MAKEFILE_PATH=$(find . -name "makefile" -o -name "Makefile" | head -n 1)
          if [ -n "$MAKEFILE_PATH" ]; then
            MAKEFILE_DIR=$(dirname "$MAKEFILE_PATH")
            cp -R "$MAKEFILE_DIR"/* . || true
          fi
          # Proje içindeki her şeye tam yetki ver
          chmod -R 777 .

      - name: Setup Theos & SDKs
        run: |
          # Theos kurulumu
          export THEOS=$HOME/theos
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          # SDK'ları indir ve yerine koy
          mkdir -p $THEOS/sdks
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip -q master.zip -d $THEOS/sdks
          mv $THEOS/sdks/sdks-master/* $THEOS/sdks/ || true
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          
      - name: Build Project
        run: |
          export THEOS=$HOME/theos
          # Derleme komutu (Hataları görmezden gelip paketi zorla yap)
          make package FINALPACKAGE=1
          
      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: Standoff2-Injector-Output
          path: |
            packages/*.deb
            *.deb
            *.ipa
