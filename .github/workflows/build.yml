name: Injector_Final_Destroyer
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Ultimate Prep
        run: |
          unzip -o "*.zip"
          # 1. Makefile'ın olduğu klasörü bul
          TARGET_DIR=$(find . -name "makefile" -o -name "Makefile" | head -n 1 | xargs dirname)
          
          # 2. Bütün projeyi ana dizine kopyala
          cp -R "$TARGET_DIR"/* . || true
          
          # 3. KittyMemory'yi indir ve dosyaları ana dizine dök
          git clone https://github.com/joeyjurjens/KittyMemory.git
          cp -R KittyMemory/KittyMemory/* . || true
          
          # 4. Makefile içindeki "KittyMemory/" yazılarını temizle (Çünkü artık her şey aynı yerde)
          sed -i '' 's/KittyMemory\///g' Makefile || true
          
          chmod -R 777 .

      - name: Setup Theos & SDKs
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          mkdir -p $THEOS/sdks
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip -q master.zip -d $THEOS/sdks
          mv $THEOS/sdks/sdks-master/* $THEOS/sdks/ || true
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          
      - name: Build Project
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          # Dosyalar burada mı diye kontrol et (Hata ayıklama için)
          ls -a
          make package FINALPACKAGE=1
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Standoff2-Injector-Final
          path: |
            packages/*.deb
            *.deb
