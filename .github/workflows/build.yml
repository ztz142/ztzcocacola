name: Injector_Final_War
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Force Prep Everything
        run: |
          unzip -o "*.zip"
          # 1. Proje dosyalarını bul ve her yere yay
          MAKEFILE_PATH=$(find . -name "makefile" -o -name "Makefile" | head -n 1)
          MAKEFILE_DIR=$(dirname "$MAKEFILE_PATH")
          cp -R "$MAKEFILE_DIR"/* . || true
          
          # 2. KittyMemory'yi indir ve HER YERE kopyala
          git clone https://github.com/joeyjurjens/KittyMemory.git
          mkdir -p KittyMemory
          # Hem klasörün içine, hem dışına, hem alt klasöre...
          cp -R KittyMemory/KittyMemory/* ./KittyMemory/ || true
          cp -R KittyMemory/KittyMemory/* . || true
          cp -R KittyMemory/KittyMemory/* ./brazilix/ || true
          
          # 3. İzinleri en yüksek seviyeye çek
          chmod -R 777 .

      - name: Setup Theos & SDKs
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          mkdir -p $THEOS/sdks
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip -q master.zip -d $THEOS/sdks
          mv $THEOS/sdks/sdks-master/* $THEOS/sdks/ || true
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          
      - name: Build Project
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          # Hataları daha detaylı görmek için
          make package FINALPACKAGE=1
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: S2-Injector-Bitti-Galiba
          path: |
            packages/*.deb
            *.deb
