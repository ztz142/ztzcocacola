name: Injector_Final_Solution_Fixed
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Ultimate File Prep
        run: |
          unzip -o "*.zip"
          # 1. Her şeyi ana dizine çıkar
          find . -mindepth 2 -type f -exec mv -t . {} + || true
          
          # 2. KittyMemory'yi indir
          git clone https://github.com/joeyjurjens/KittyMemory.git
          cp -R KittyMemory/KittyMemory/* . || true
          
          # 3. Makefile'ı zorla güncelle (Tweak.x ve brazilix karmaşasını bitir)
          # Makefile içinde .mm veya .x uzantılı ne varsa onu bulup yolu temizle
          sed -i '' 's/KittyMemory\///g' Makefile || true
          sed -i '' 's/-IKittyMemory//g' Makefile || true
          
          chmod -R 777 .

      - name: Setup Theos & SDKs
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          mkdir -p $THEOS/sdks
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip -q master.zip -d $THEOS/sdks
          mv $THEOS/sdks/sdks-master/* $THEOS/sdks/ || true
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          
      - name: Build Project
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          # Derlemeyi başlat - Bu sefer Tweak.x üzerinden yürüyecek
          make package FINALPACKAGE=1
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Standoff2-Injector-FINAL
          path: |
            packages/*.deb
            *.deb
