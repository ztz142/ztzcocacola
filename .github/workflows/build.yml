name: Injector_Orion_Fix
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          mkdir -p $THEOS/sdks
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz -C $THEOS/sdks --strip-components=1
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Prepare Project
        run: |
          unzip -o "*.zip"
          MAKE_PATH=$(find . -name "Makefile" | head -n 1)
          PROJ_DIR=$(dirname "$MAKE_PATH")
          
          # KittyMemory'yi olması gereken yere çek
          git clone https://github.com/joeyjurjens/KittyMemory.git "$PROJ_DIR/KittyMemory"
          
          # Makefile'ı Orion hatalarından temizleyip standart Theos'a zorla
          sed -i '' 's/include $(ORION)\/makefiles\/tweak.mk/include $(THEOS)\/makefiles\/common.mk\ninclude $(THEOS)\/makefiles\/tweak.mk/g' "$PROJ_DIR/Makefile" || true
          
          echo "PROJ_DIR=$PROJ_DIR" >> $GITHUB_ENV

      - name: Build Project
        run: |
          cd $PROJ_DIR
          export THEOS=$GITHUB_WORKSPACE/theos
          # Hataları daha net görmek ve Orion'u bypass etmek için
          make package FINALPACKAGE=1 DEBUG=0
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: S2-Injector-Package
          path: ${{ env.PROJ_DIR }}/packages/*.deb
