name: Injector_Deep_Fix
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract and Map Directories
        run: |
          unzip -o "*.zip"
          # Proje dosyalarını bul ve ana dizine yay
          MAKEFILE_PATH=$(find . -name "makefile" -o -name "Makefile" | head -n 1)
          MAKEFILE_DIR=$(dirname "$MAKEFILE_PATH")
          cp -R "$MAKEFILE_DIR"/* . || true
          
          # KittyMemory'yi indir
          git clone https://github.com/joeyjurjens/KittyMemory.git
          
          # Projenin beklediği klasör yapısını zorla oluştur
          mkdir -p KittyMemory
          cp -R KittyMemory/KittyMemory/* ./KittyMemory/ || true
          
          # İzinleri ver
          chmod -R 777 .

      - name: Setup Theos & SDKs
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          mkdir -p $THEOS/sdks
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip -q master.zip -d $THEOS/sdks
          mv $THEOS/sdks/sdks-master/* $THEOS/sdks/ || true
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          
      - name: Build Project
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          # Klasör yapısını son kez kontrol et (Hata ayıklama için)
          ls -R KittyMemory
          make package FINALPACKAGE=1
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: S2-Injector-Final-Build
          path: |
            packages/*.deb
            *.deb
