name: Injector_Final_Fix_v6
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Prep Files & Fix Makefile
        run: |
          unzip -o "*.zip"
          # Proje dosyalarını bul ve her şeyi ana dizine taşı
          MAKEFILE_PATH=$(find . -name "makefile" -o -name "Makefile" | head -n 1)
          MAKEFILE_DIR=$(dirname "$MAKEFILE_PATH")
          cp -R "$MAKEFILE_DIR"/* . || true
          
          # KittyMemory'yi indir
          git clone https://github.com/joeyjurjens/KittyMemory.git
          
          # Makefile içindeki hatalı yolları düzelt (Otomatik Tamir)
          sed -i '' 's/-IKittyMemory//g' Makefile || true
          sed -i '' 's/KittyMemory\///g' Makefile || true
          
          # Dosyaları her yere kopyala ki hata payı kalmasın
          mkdir -p KittyMemory
          cp -R KittyMemory/* ./KittyMemory/ || true
          cp -R KittyMemory/KittyMemory/* . || true
          
          chmod -R 777 .

      - name: Setup Theos & SDKs
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          mkdir -p $THEOS/sdks
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip -q master.zip -d $THEOS/sdks
          mv $THEOS/sdks/sdks-master/* $THEOS/sdks/ || true
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          
      - name: Build Project
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          # Derlemeyi başlat
          make package FINALPACKAGE=1
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: S2-Injector-Bitti-Mi
          path: |
            packages/*.deb
            *.deb
