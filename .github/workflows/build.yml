name: Orion_Injector_Build_Final
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-13  # Daha stabil bir sürüm seçtik
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos and Orion
        run: |
          # Theos Kurulumu
          export THEOS=$GITHUB_WORKSPACE/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          # SDK ve Orion İçin Gerekenler
          mkdir -p $THEOS/sdks
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz -C $THEOS/sdks --strip-components=1
          
          # Orion Framework'ü kur
          git clone --recursive https://github.com/theos/Orion.git $THEOS/vendor/Orion
          
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "ORION=$THEOS/vendor/Orion" >> $GITHUB_ENV

      - name: Prepare Files
        run: |
          unzip -o "*.zip"
          # Klasör yapısını düzelt
          MAKE_PATH=$(find . -name "Makefile" | head -n 1)
          PROJ_DIR=$(dirname "$MAKE_PATH")
          
          # KittyMemory
          git clone https://github.com/joeyjurjens/KittyMemory.git "$PROJ_DIR/KittyMemory"
          
          echo "PROJ_DIR=$PROJ_DIR" >> $GITHUB_ENV

      - name: Build Project
        run: |
          cd $PROJ_DIR
          export THEOS=$GITHUB_WORKSPACE/theos
          export ORION=$THEOS/vendor/Orion
          # Orion'un Xcode bağımlılığını en aza indirip Theos ile zorla
          make package FINALPACKAGE=1 DEBUG=0
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Standoff2-Injector-Package
          path: ${{ env.PROJ_DIR }}/packages/*.deb
