name: Injector_Build_v2
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Unzip Files
        run: |
          unzip -o kod.zip
          # Klasörlerin içinde ne var kontrol et ve ana dizine taşı
          find . -maxdepth 3 -name "makefile" -exec dirname {} \; | xargs -I {} mv {}/* . || true

      - name: Setup Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          
      - name: Build Project
        run: |
          export THEOS=$HOME/theos
          # Eğer build.sh varsa çalıştır, yoksa make ile paketle
          if [ -f "build.sh" ]; then
            chmod +x build.sh
            ./build.sh
          else
            make package FINALPACKAGE=1
          fi
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Standoff-Injector-Final
          path: |
            packages/*.deb
            *.ipa
            build/*.ipa
            *.deb
            ./*.deb
