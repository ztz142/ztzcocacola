name: Injector_Final_Victory_v2
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Force Fix File Names
        run: |
          unzip -o "*.zip"
          # 1. Her şeyi ana dizine çıkar (dosyalar nerede olursa olsun)
          find . -mindepth 2 -type f -exec mv -t . {} + || true
          
          # 2. Dosya isimlerini Makefile ile eşitlemek için zorla küçük harf yapalım
          # Özellikle brazilix.mm dosyasını bul ve adını tam olarak 'brazilix.mm' yap
          mv $(find . -iname "brazilix.mm") brazilix.mm || true
          
          # 3. KittyMemory'yi çek ve eksik headerları tamamla
          git clone https://github.com/joeyjurjens/KittyMemory.git
          cp -R KittyMemory/KittyMemory/* . || true
          
          # 4. Makefile'ı temizle (Gereksiz yolları sil)
          sed -i '' 's/KittyMemory\///g' Makefile || true
          sed -i '' 's/-IKittyMemory//g' Makefile || true
          
          chmod -R 777 .

      - name: Setup Theos & SDKs
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          mkdir -p $THEOS/sdks
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip -q master.zip -d $THEOS/sdks
          mv $THEOS/sdks/sdks-master/* $THEOS/sdks/ || true
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          
      - name: Build Project
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          # Dosyaları listele ki hata olursa neyi görmediğini anlayalım
          ls -F
          make package FINALPACKAGE=1
          
      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: S2-Injector-Success
          path: |
            packages/*.deb
            *.deb
