name: Injector_Final_Fix
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract and Move Files
        run: |
          unzip -o "*.zip"
          # Klasör içindeki dosyaları ana dizine taşı (brazilix vb. klasörleri aşar)
          find . -name "makefile" -exec dirname {} \; | xargs -I {} mv {}/* . || true
          find . -name "Makefile" -exec dirname {} \; | xargs -I {} mv {}/* . || true

      - name: Setup Theos & SDK
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip master.zip -d $HOME/theos/sdks
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          
      - name: Build Project
        run: |
          export THEOS=$HOME/theos
          # Dosyalar geldi mi kontrol et
          ls -R
          if [ -f "makefile" ] || [ -f "Makefile" ]; then
            make package FINALPACKAGE=1
          else
            echo "Kritik Hata: Makefile hala bulunamadı!"
            exit 1
          fi
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Standoff-Injector-App
          path: |
            packages/*.deb
            *.ipa
            *.deb
