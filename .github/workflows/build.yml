name: Injector_Final_Victory_v3
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Rename and Prep Files
        run: |
          unzip -o "*.zip"
          # 1. Bütün dosyaları ana dizine çıkar
          find . -mindepth 2 -type f -exec mv -t . {} + || true
          
          # 2. DOSYA ADINI DÜZELT (Büyük B -> küçük b)
          # Eğer dosya ismi Brazilix.mm ise onu brazilix.mm yapıyoruz
          mv Brazilix.mm brazilix.mm || true
          
          # 3. KittyMemory'yi indir ve dosyaları ana dizine dök
          git clone https://github.com/joeyjurjens/KittyMemory.git
          cp -R KittyMemory/KittyMemory/* . || true
          
          # 4. Makefile içindeki temizlik
          sed -i '' 's/KittyMemory\///g' Makefile || true
          sed -i '' 's/-IKittyMemory//g' Makefile || true
          
          chmod -R 777 .

      - name: Setup Theos & SDKs
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          mkdir -p $THEOS/sdks
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip -q master.zip -d $THEOS/sdks
          mv $THEOS/sdks/sdks-master/* $THEOS/sdks/ || true
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          
      - name: Build Project
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          # Derleme
          make package FINALPACKAGE=1
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: S2-Injector-Bitti-Gitti
          path: |
            packages/*.deb
            *.deb
