name: Injector_Final_Victory
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Force Everything to Root
        run: |
          unzip -o "*.zip"
          # 1. Bütün dosyaları alt klasörlerden ana dizine çıkar
          find . -mindepth 2 -type f -exec mv -t . {} + || true
          
          # 2. KittyMemory'yi indir ve dosyaları ana dizine dök
          git clone https://github.com/joeyjurjens/KittyMemory.git
          cp -R KittyMemory/KittyMemory/* . || true
          
          # 3. Makefile içindeki hatalı olabilecek yolları temizle
          sed -i '' 's/KittyMemory\///g' Makefile || true
          sed -i '' 's/-IKittyMemory//g' Makefile || true
          
          # 4. Dosya isimlerini kontrol et (Hata ayıklama için)
          ls -R
          chmod -R 777 .

      - name: Setup Theos & SDKs
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          mkdir -p $THEOS/sdks
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip -q master.zip -d $THEOS/sdks
          mv $THEOS/sdks/sdks-master/* $THEOS/sdks/ || true
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          
      - name: Build Project
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          # Derlemeyi başlat
          make package FINALPACKAGE=1
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Standoff2-Final-App
          path: |
            packages/*.deb
            *.deb
