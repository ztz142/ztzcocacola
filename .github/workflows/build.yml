name: Injector_Build_From_Zip
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Unzip Files
        run: |
          unzip -o "*.zip"
          mv */* . || true 

      - name: Setup Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          
      - name: Build Project
        run: |
          export THEOS=$HOME/theos
          chmod +x build.sh || true
          if [ -f "build.sh" ]; then ./build.sh; else make package FINALPACKAGE=1; fi
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Standoff-Injector-Output
          path: |
            packages/*.deb
            *.ipa
            build/*.ipa
            *.deb
